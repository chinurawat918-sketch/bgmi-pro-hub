<!DOCTYPE html>
<html>
<head>
    <title>M416 3D Advanced</title>

    <style>
        body {
            margin: 0;
            background: black;
            height: 100vh;
            overflow: hidden;
        }

        /* 📦 LEFT POSITION */
        .container {
            position: absolute;
            left: 50px;
            top: 50%;
            transform: translateY(-50%);
            
            width: 600px;
            aspect-ratio: 4/3;
            perspective: 1200px;
        }

        /* 🖼 FRAME */
        .frame {
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 0 30px cyan;
            position: relative;
        }

        /* 🔫 GUN */
        .gun {
            width: 120%;
            position: absolute;
            top: -10%;
            left: -10%;
            transition: transform 0.05s ease;
            filter: drop-shadow(0 0 25px cyan);
        }

    </style>
</head>

<body>

    <div class="container" id="box">
        <div class="frame">
            <img src="m416.png" class="gun" id="gun">
        </div>
    </div>

    <script>
        const box = document.getElementById("box");
        const gun = document.getElementById("gun");

        function moveGun(x, y) {
            let rect = box.getBoundingClientRect();

            let percentX = (x / rect.width - 0.5);
            let percentY = (y / rect.height - 0.5);

            let moveX = percentX * 60;
            let moveY = percentY * 60;

            let rotateX = -percentY * 25;
            let rotateY = percentX * 25;

            gun.style.transform = `
                translate(${moveX}px, ${moveY}px)
                rotateX(${rotateX}deg)
                rotateY(${rotateY}deg)
            `;
        }

        /* 🖱️ MOUSE */
        box.addEventListener("mousemove", (e) => {
            let rect = box.getBoundingClientRect();
            moveGun(e.clientX - rect.left, e.clientY - rect.top);
        });

        /* 📱 TOUCH */
        box.addEventListener("touchmove", (e) => {
            let rect = box.getBoundingClientRect();
            let touch = e.touches[0];
            moveGun(touch.clientX - rect.left, touch.clientY - rect.top);
        });

        /* RESET */
        box.addEventListener("mouseleave", () => {
            gun.style.transform = "translate(0,0) rotateX(0) rotateY(0)";
        });
    </script>

</body>
</html>
