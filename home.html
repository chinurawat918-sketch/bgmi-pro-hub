<!DOCTYPE html>
<html>
<body style="margin:0; background:black;">

<div id="box" style="position:absolute; top:0; left:0; width:800px; height:600px;"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// Scene
let scene = new THREE.Scene();

// Camera (perfect center view)
let camera = new THREE.PerspectiveCamera(75, 800/600, 0.1, 1000);
camera.position.z = 8;

// Renderer
let renderer = new THREE.WebGLRenderer();
renderer.setSize(800, 600);
document.getElementById("box").appendChild(renderer.domElement);

// Light
scene.add(new THREE.AmbientLight(0xffffff,1));

// Base rotation
let baseY = Math.PI/24;
let baseX = -Math.PI/2;

// Guns storage
let guns = [];
let activeGun = null;

// Add gun function
function addGun(path, x, y){
    new THREE.GLTFLoader().load(path, (gltf)=>{
        let gun = gltf.scene;

        // 🔥 balanced size (important)
        gun.scale.set(3.5,3.5,3.5);

        gun.position.set(x, y, 0);

        gun.rotation.y = baseY;
        gun.rotation.x = baseX;

        scene.add(gun);
        guns.push(gun);
    });
}

// 🔫 PERFECT POSITIONS
addGun('pubg_mobile_m4_glacier.glb', -2, 1.5);   // top-left
addGun('awm_godzilla_animated_4k_textures.glb', 2, 1.5);   // top-right
addGun('ump-45__aggressor.glb', -2, -1.5); // bottom-left
addGun('ak47.glb', 2, -1.5); // bottom-right

// Raycaster
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

let speed = 8;
let targetX = 0;
let targetY = 0;

// Mouse select
window.addEventListener("mousedown", (e)=>{
    mouse.x = (e.clientX / 800) * 2 - 1;
    mouse.y = -(e.clientY / 600) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    let intersects = raycaster.intersectObjects(guns, true);

    if(intersects.length > 0){
        activeGun = intersects[0].object.parent;
    }
});

window.addEventListener("mouseup", ()=>{
    activeGun = null;
    targetX = 0;
    targetY = 0;
});

// Mouse move
window.addEventListener("mousemove", (e)=>{
    if(activeGun){
        targetX = (e.clientX / 800 - 0.5) * speed;
        targetY = (e.clientY / 600 - 0.5) * speed;
    }
});

// Touch
window.addEventListener("touchstart", (e)=>{
    let t = e.touches[0];

    mouse.x = (t.clientX / 800) * 2 - 1;
    mouse.y = -(t.clientY / 600) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    let intersects = raycaster.intersectObjects(guns, true);

    if(intersects.length > 0){
        activeGun = intersects[0].object.parent;
    }
});

window.addEventListener("touchend", ()=>{
    activeGun = null;
    targetX = 0;
    targetY = 0;
});

window.addEventListener("touchmove", (e)=>{
    e.preventDefault();

    if(activeGun){
        let t = e.touches[0];

        targetX = (t.clientX / 800 - 0.5) * speed;
        targetY = (t.clientY / 600 - 0.5) * speed;
    }
});

// Animation
function animate(){
    requestAnimationFrame(animate);

    guns.forEach(gun=>{
        if(gun === activeGun){
            gun.rotation.y += ((baseY + targetX) - gun.rotation.y) * 0.2;
            gun.rotation.x += ((baseX - targetY) - gun.rotation.x) * 0.2;
        } else {
            gun.rotation.y += (baseY - gun.rotation.y) * 0.05;
            gun.rotation.x += (baseX - gun.rotation.x) * 0.05;
        }
    });

    renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
