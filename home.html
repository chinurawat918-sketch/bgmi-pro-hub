<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BGMI Gun Effect</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

/* Fixed image box */
.container {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 400px;   /* 4:3 ratio */
    height: 300px;
    perspective: 1000px;
}

/* Gun image */
.gun {
    width: 100%;
    height: 100%;
    transition: transform 0.1s;
    transform-style: preserve-3d;
}
</style>
</head>

<body>

<div class="container">
    <img src="m416.png" class="gun" id="gun">
</div>

<script>
const gun = document.getElementById("gun");

document.addEventListener("mousemove", (e) => {

    let x = (window.innerWidth / 2 - e.clientX) / 20;
    let y = (window.innerHeight / 2 - e.clientY) / 20;

    gun.style.transform = `
        rotateY(${x}deg)
        rotateX(${y}deg)
        scale(1.05)
    `;
});
</script>

</body>
</html>
