 <!DOCTYPE html>
<html>
<body style="margin:0; background:black;">

<div id="box" style="
position:absolute;
top:0;
left:0;
width:800px;
height:600px;
"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// Scene
let scene = new THREE.Scene();

// Camera (same)
let camera = new THREE.PerspectiveCamera(75, 800/600, 0.1, 1000);
camera.position.z = 25;

// Renderer
let renderer = new THREE.WebGLRenderer();
renderer.setSize(800, 600);
document.getElementById("box").appendChild(renderer.domElement);

// Light
scene.add(new THREE.AmbientLight(0xffffff,1));

// ================= GUNS =================
let baseY1 = Math.PI/24, baseX1 = -Math.PI/2;
let baseY2 = Math.PI/2,  baseX2 = Math.PI/6;
let baseY3 = Math.PI/6,  baseX3 = Math.PI/6;

let gun1, gun2, gun3;

// 🔫 Gun 1 (LEFT)
new THREE.GLTFLoader().load('pubg_mobile_m4_glacier.glb', (gltf)=>{
    gun1 = gltf.scene;
    gun1.scale.set(20,20,20);

    // 🔥 LEFT SIDE
    gun1.position.set(-36, 0, 0);

    gun1.rotation.set(baseX1, baseY1, 0);
    scene.add(gun1);
});

// 🔫 Gun 2 (CENTER)
new THREE.GLTFLoader().load('ump-45__aggressor.glb', (gltf)=>{
    gun2 = gltf.scene;
    gun2.scale.set(.5,.5,.5);

    // 🔥 CENTER
    gun2.position.set(36, 0, 0);

    gun2.rotation.set(baseX2, baseY2, 0);
    scene.add(gun2);
});

// 🔫 Gun 3 (RIGHT)
new THREE.GLTFLoader().load('awm_godzilla_animated_4k_textures.glb', (gltf)=>{
    gun3 = gltf.scene;
    gun3.scale.set(20,20,20);

    // 🔥 RIGHT SIDE
    gun3.position.set(72, 0, 0);

    gun3.rotation.set(baseX3, baseY3, 0);
    scene.add(gun3);
});

// ================= CONTROLS =================
let activeGun = null;
let targetX = 0;
let targetY = 0;

let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

function selectGun(clientX, clientY){
    let rect = renderer.domElement.getBoundingClientRect();

    mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    let intersects = raycaster.intersectObjects([gun1, gun2, gun3], true);

    if(intersects.length > 0){
        let obj = intersects[0].object;

        while (obj.parent && ![gun1, gun2, gun3].includes(obj)) {
            obj = obj.parent;
        }

        activeGun = obj;
    }
}

// Mouse
window.addEventListener("mousedown", (e)=>{
    selectGun(e.clientX, e.clientY);
});

window.addEventListener("mouseup", ()=>{
    activeGun = null;
});

window.addEventListener("mousemove", (e)=>{
    if(activeGun){
        targetX = (e.movementX) * 0.01;
        targetY = (e.movementY) * 0.01;
    }
});

// Touch
window.addEventListener("touchstart", (e)=>{
    let t = e.touches[0];
    selectGun(t.clientX, t.clientY);
});

window.addEventListener("touchend", ()=>{
    activeGun = null;
});

window.addEventListener("touchmove", (e)=>{
    e.preventDefault();

    if(activeGun){
        let t = e.touches[0];

        targetX = (t.clientX / window.innerWidth - 0.5) * 0.1;
        targetY = (t.clientY / window.innerHeight - 0.5) * 0.1;
    }
});

// ================= ANIMATION =================
function animate(){
    requestAnimationFrame(animate);

    [gun1, gun2, gun3].forEach((gun, i)=>{
        if(!gun) return;

        let baseY = [baseY1, baseY2, baseY3][i];
        let baseX = [baseX1, baseX2, baseX3][i];

        if(gun === activeGun){
            gun.rotation.y += targetX;
            gun.rotation.x += targetY;
        } else {
            gun.rotation.y += (baseY - gun.rotation.y) * 0.08;
            gun.rotation.x += (baseX - gun.rotation.x) * 0.08;
        }
    });

    renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
