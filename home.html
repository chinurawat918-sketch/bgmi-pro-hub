<!DOCTYPE html>
<html>
<head>
    <title>M416 Interactive</title>

    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 📦 IMAGE CONTAINER (FIXED POSITION) */
        .container {
            width: 600px;
            perspective: 1000px;
        }

        /* 🔫 IMAGE */
        .gun {
            width: 100%;
            transition: transform 0.1s ease;
            transform-style: preserve-3d;
            filter: drop-shadow(0 0 20px cyan);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

    </style>
</head>

<body>

    <div class="container" id="box">
        <div class="gun" id="gun">
            <img src="m416.png">
        </div>
    </div>

    <script>
        const box = document.getElementById("box");
        const gun = document.getElementById("gun");

        function moveGun(x, y) {
            let rect = box.getBoundingClientRect();

            let centerX = rect.width / 2;
            let centerY = rect.height / 2;

            let rotateX = -(y - centerY) / 15;
            let rotateY = (x - centerX) / 15;

            gun.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }

        /* 🖱️ MOUSE */
        box.addEventListener("mousemove", (e) => {
            let rect = box.getBoundingClientRect();
            moveGun(e.clientX - rect.left, e.clientY - rect.top);
        });

        /* 📱 TOUCH */
        box.addEventListener("touchmove", (e) => {
            let rect = box.getBoundingClientRect();
            let touch = e.touches[0];
            moveGun(touch.clientX - rect.left, touch.clientY - rect.top);
        });

        /* RESET */
        box.addEventListener("mouseleave", () => {
            gun.style.transform = "rotateX(0deg) rotateY(0deg)";
        });

    </script>

</body>
</html>
