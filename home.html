<!DOCTYPE html>
<html>
<head>
    <title>M416 Glacier Animation</title>

    <style>
        body {
            background: black;
            overflow: hidden;
            margin: 0;
        }

        /* 🔫 IMAGE CONTAINER */
        .gun {
            position: absolute;
            width: 500px;
            animation: moveGun 10s infinite alternate ease-in-out;
        }

        /* 🔥 IMAGE STYLE */
        .gun img {
            width: 100%;
            filter: drop-shadow(0 0 20px cyan);
        }

        /* 🚀 ANIMATION (ALL DIRECTIONS) */
        @keyframes moveGun {
            0%   { top: 10%; left: 10%; }
            25%  { top: 20%; left: 70%; }
            50%  { top: 60%; left: 60%; }
            75%  { top: 70%; left: 20%; }
            100% { top: 30%; left: 40%; }
        }

    </style>
</head>

<body>

    <!-- 🔫 YOUR IMAGE -->
    <div class="gun">
        <img src="m416.png">
    </div>

</body>
</html>
