 <!DOCTYPE html>
<html>
<body style="margin:0; background:black; overflow:hidden;">

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// Scene
let scene = new THREE.Scene();

// Camera
let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

// 🔥 TOP LEFT VIEW
camera.position.set(-5, 6, 8);
camera.lookAt(-15, 3, 0);

// Renderer
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
scene.add(new THREE.AmbientLight(0xffffff,1));

// Base rotation
let baseY = Math.PI/24;
let baseX = -Math.PI/2;

// Gun
let gun;
new THREE.GLTFLoader().load('pubg_mobile_m4_glacier.glb', (gltf)=>{
    gun = gltf.scene;

    gun.scale.set(6,6,6);
    gun.position.set(-2, 2, 0);

    gun.rotation.y = baseY;
    gun.rotation.x = baseX;

    scene.add(gun);
});

// Control
let rightClick = false;
let isTouch = false;

let speed = 8;
let targetX = 0;
let targetY = 0;

// Mouse
window.addEventListener("mousedown", (e)=>{
    if(e.button === 2) rightClick = true;
});

window.addEventListener("mouseup", ()=>{
    rightClick = false;
    targetX = 0;
    targetY = 0;
});

window.addEventListener("contextmenu", e=>e.preventDefault());

window.addEventListener("mousemove", (e)=>{
    if(gun && rightClick){
        targetX = (e.clientX / window.innerWidth - 0.5) * speed;
        targetY = (e.clientY / window.innerHeight - 0.5) * speed;
    }
});

// 🔥 TOUCH SUPPORT (ADDED)
window.addEventListener("touchstart", ()=>{
    isTouch = true;
});

window.addEventListener("touchend", ()=>{
    isTouch = false;
    targetX = 0;
    targetY = 0;
});

window.addEventListener("touchmove", (e)=>{
    e.preventDefault();

    if(gun && isTouch){
        let t = e.touches[0];

        targetX = (t.clientX / window.innerWidth - 0.5) * speed;
        targetY = (t.clientY / window.innerHeight - 0.5) * speed;
    }
});

// Animation
function animate(){
    requestAnimationFrame(animate);

    if(gun){
        if(rightClick || isTouch){
            // 🔥 FAST MOVE
            gun.rotation.y += ((baseY + targetX) - gun.rotation.y) * 0.2;
            gun.rotation.x += ((baseX - targetY) - gun.rotation.x) * 0.2;
        } else {
            // 🔥 SLOW RETURN
            gun.rotation.y += (baseY - gun.rotation.y) * 0.05;
            gun.rotation.x += (baseX - gun.rotation.x) * 0.05;
        }
    }

    renderer.render(scene,camera);
}
animate();

// Resize fix
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
