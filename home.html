 <!DOCTYPE html>
<html>
<body style="margin:0; background:black; overflow:hidden;">

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// Scene
let scene = new THREE.Scene();

// Camera
let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

// Same camera (covers all)
camera.position.set(0, 2, 12);

// Renderer
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
scene.add(new THREE.AmbientLight(0xffffff,1));

// Base rotation
let baseY = Math.PI/24;
let baseX = -Math.PI/2;

// Loader
let loader = new THREE.GLTFLoader();

// 🔥 POSITIONS FOR 5 GUNS
let positions = [
  [-6, 3, 0],   // gun1 (top-left)
  [0, 3, 0],    // gun2 (top-center)
  [6, 3, 0],    // gun3 (top-right)
  [-3, -1, 0],  // gun4 (bottom-left)
  [3, -1, 0]    // gun5 (bottom-right)
];

// Store guns
let guns = [];

// Load 5 guns (same model for now)
positions.forEach((pos, i)=>{
    loader.load('pubg_mobile_m4_glacier.glb', (gltf)=>{
        let gun = gltf.scene;

        // 🔥 smaller size so all fit
        gun.scale.set(3,3,3);

        gun.position.set(pos[0], pos[1], pos[2]);

        gun.rotation.y = baseY;
        gun.rotation.x = baseX;

        scene.add(gun);
        guns.push(gun);
    });
});

// Animation
function animate(){
    requestAnimationFrame(animate);

    guns.forEach(gun=>{
        // slight idle rotation
        gun.rotation.y += 0.005;
    });

    renderer.render(scene,camera);
}
animate();

// Resize
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
