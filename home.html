 <!DOCTYPE html>
<html>
<body style="margin:0; background:black;">

<div id="box" style="
position:absolute;
top:0;
left:0;
width:1600px;
height:900px; 
"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// Scene
let scene = new THREE.Scene();

// Camera
let camera = new THREE.PerspectiveCamera(75, 1600/900, 0.1, 1000);
camera.position.z = 40;

// Renderer
let renderer = new THREE.WebGLRenderer();
renderer.setSize(1600, 900);
document.getElementById("box").appendChild(renderer.domElement);

// Light
scene.add(new THREE.AmbientLight(0xffffff,1));

// ================= GUNS =================
let baseY1 = Math.PI/24, baseX1 = -Math.PI/2;
let baseY2 = Math.PI/2,  baseX2 = Math.PI/6;
let baseY3 = Math.PI/2,  baseX3 = 0;
let baseY4 = Math.PI/2,  baseX4 = 0;

let gun1, gun2, gun3, gun3Group, gun4;

// 🔫 Gun 1
new THREE.GLTFLoader().load('pubg_mobile_m4_glacier.glb', (gltf)=>{
    gun1 = gltf.scene;
    gun1.scale.set(35,35,35);
    gun1.position.set(-40,15, 0);
    gun1.rotation.set(0, Math.PI/2,0);
    scene.add(gun1);
});

// 🔫 Gun 2
new THREE.GLTFLoader().load('ump-45__aggressor.glb', (gltf)=>{
    gun2 = gltf.scene;
    gun2.scale.set(.8,.8,.8);
    gun2.position.set(0, 20, 0);
    gun2.rotation.set(0, Math.PI/2,0);
    scene.add(gun2);
});

// 🔫 Gun 3
new THREE.GLTFLoader().load('awm_godzilla_animated_4k_textures.glb', (gltf)=>{
    gun3 = gltf.scene;

    gun3Group = new THREE.Group();
    scene.add(gun3Group);

    gun3.scale.set(35,35,35);
    gun3.rotation.set(0, Math.PI/2,0);

    gun3Group.add(gun3);
    gun3Group.position.set(15,10, 0);
});

// 🔫 Gun 4 (NEW)
new THREE.GLTFLoader().load('p90_hero_v1.glb', (gltf)=>{
    gun4 = gltf.scene;

    gun4.scale.set(2,2,2); // adjust if needed
    gun4.position.set(40,15, 0); // right side
    gun4.rotation.set(0, Math.PI/2,0);

    scene.add(gun4);
});

// ================= CONTROLS =================
let activeGun = null;
let targetX = 0;
let targetY = 0;

let offsetX = 0;
let offsetY = 0;

let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

function selectGun(clientX, clientY){
    let rect = renderer.domElement.getBoundingClientRect();

    mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    let intersects = raycaster.intersectObjects([gun1, gun2, gun3Group, gun4], true);

    if(intersects.length > 0){
        let obj = intersects[0].object;

        while (obj.parent && ![gun1, gun2, gun3Group, gun4].includes(obj)) {
            obj = obj.parent;
        }

        activeGun = obj;
    }
}

// Mouse
window.addEventListener("mousedown", (e)=>{
    selectGun(e.clientX, e.clientY);
});

window.addEventListener("mouseup", ()=>{
    activeGun = null;
});

window.addEventListener("mousemove", (e)=>{
    if(activeGun){
        targetX = (e.movementX) * 0.01;
        targetY = (e.movementY) * 0.01;
    }
});

// TOUCH
let lastX = 0;
let lastY = 0;

window.addEventListener("touchstart", (e)=>{
    let t = e.touches[0];
    selectGun(t.clientX, t.clientY);

    lastX = t.clientX;
    lastY = t.clientY;
});

window.addEventListener("touchmove", (e)=>{
    if(activeGun){
        let t = e.touches[0];

        let dx = t.clientX - lastX;
        let dy = t.clientY - lastY;

        targetX = dx * 0.01;
        targetY = dy * 0.01;

        lastX = t.clientX;
        lastY = t.clientY;
    }
});

window.addEventListener("touchend", ()=>{
    activeGun = null;
});

// Arrow keys
window.addEventListener("keydown", (e)=>{
    if(e.key === "ArrowRight") offsetX += 0.5;
    if(e.key === "ArrowLeft") offsetX -= 0.5;
    if(e.key === "ArrowUp") offsetY += 0.5;
    if(e.key === "ArrowDown") offsetY -= 0.5;
});

// ================= ANIMATION =================
function animate(){
    requestAnimationFrame(animate);

    if(gun3Group){
        gun3Group.position.x = 35 + offsetX;
        gun3Group.position.y = 0 + offsetY;
    }

    [gun1, gun2, gun3Group, gun4].forEach((gun, i)=>{
        if(!gun) return;

        let baseY = [baseY1, baseY2, baseY3, baseY4][i];
        let baseX = [baseX1, baseX2, baseX3, baseX4][i];

        if(gun === activeGun){
            gun.rotation.y += targetX;
            gun.rotation.x += targetY;
        } else {
            gun.rotation.y += (baseY - gun.rotation.y) * 0.08;
            gun.rotation.x += (baseX - gun.rotation.x) * 0.08;
        }
    });

    renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
