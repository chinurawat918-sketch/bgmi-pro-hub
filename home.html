<!DOCTYPE html>
<html>
<body style="margin:0; background:black; display:flex; justify-content:center; align-items:center; height:100vh;">

<div id="box"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let width = 800, height = 600;

// Scene
let scene = new THREE.Scene();

// Camera
let camera = new THREE.PerspectiveCamera(75, width/height, 0.1, 1000);
camera.position.z = 6;

// Renderer
let renderer = new THREE.WebGLRenderer();
renderer.setSize(width, height);
document.getElementById("box").appendChild(renderer.domElement);

// Light
scene.add(new THREE.AmbientLight(0xffffff,1));

// 🔥 BASE ROTATION
let baseY = +Math.PI/24;
let baseX = -Math.PI/2;

// Load gun
let gun;
new THREE.GLTFLoader().load('pubg_mobile_m4_glacier.glb', (gltf)=>{
    gun = gltf.scene;

    gun.scale.set(8,8,8);

    gun.rotation.y = baseY;
    gun.rotation.x = baseX;

    scene.add(gun);
});

// Control
let rightClick = false;
let speed = 4;

let targetX = 0;
let targetY = 0;

// Mouse down
window.addEventListener("mousedown", (e)=>{
    if(e.button === 2) rightClick = true;
});

// Mouse up
window.addEventListener("mouseup", ()=>{
    rightClick = false;
    targetX = 0;
    targetY = 0;
});

// Disable menu
window.addEventListener("contextmenu", e=>e.preventDefault());

// Mouse move
window.addEventListener("mousemove", (e)=>{
    if(gun && rightClick){
        targetX = (e.clientX / window.innerWidth - 0.5) * speed;
        targetY = (e.clientY / window.innerHeight - 0.5) * speed;
    }
});

// Touch
window.addEventListener("touchmove", (e)=>{
    let t = e.touches[0];
    targetX = (t.clientX / window.innerWidth - 0.5) * speed;
    targetY = (t.clientY / window.innerHeight - 0.5) * speed;
});

// Animation (SMOOTH)
function animate(){
    requestAnimationFrame(animate);

    if(gun){
        // 🔥 smooth movement (no jum
        gun.rotation.y += ((baseY + targetX) - gun.rotation.y) * 0.08;
        gun.rotation.x += ((baseX - targetY) - gun.rotation.x) * 0.08;
    }

    renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
