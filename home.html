<!DOCTYPE html>
<html>
<body style="margin:0; background:black; overflow:hidden;">

<!-- 🔙 Back Button -->
<button onclick="window.location.href='index.html'"
style="position:absolute; top:20px; left:20px; padding:10px 15px; font-size:16px; cursor:pointer;">
⬅ Back
</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// Scene
let scene = new THREE.Scene();

// Camera (FULL SCREEN)
let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);
camera.position.z = 6;

// Renderer FULL SCREEN
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
scene.add(new THREE.AmbientLight(0xffffff,1));

// 🔥 BASE ROTATION (your same view)
let baseY = Math.PI/24;
let baseX = -Math.PI/2;

// Load gun (IMPORTANT: same folder)
let gun;
new THREE.GLTFLoader().load('pubg_mobile_m4_glacier.glb', (gltf)=>{
    gun = gltf.scene;

    gun.scale.set(8,8,8);

    gun.rotation.y = baseY;
    gun.rotation.x = baseX;

    scene.add(gun);
});

// Control
let rightClick = false;
let speed = 4;

let targetX = 0;
let targetY = 0;

// Mouse
window.addEventListener("mousedown", (e)=>{
    if(e.button === 2) rightClick = true;
});

window.addEventListener("mouseup", ()=>{
    rightClick = false;
    targetX = 0;
    targetY = 0;
});

window.addEventListener("contextmenu", e=>e.preventDefault());

window.addEventListener("mousemove", (e)=>{
    if(gun && rightClick){
        targetX = (e.clientX / window.innerWidth - 0.5) * speed;
        targetY = (e.clientY / window.innerHeight - 0.5) * speed;
    }
});

// Touch
window.addEventListener("touchmove", (e)=>{
    let t = e.touches[0];
    targetX = (t.clientX / window.innerWidth - 0.5) * speed;
    targetY = (t.clientY / window.innerHeight - 0.5) * speed;
});

// 🔥 RESIZE FIX (VERY IMPORTANT FOR WEBSITE)
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation (SMOOTH)
function animate(){
    requestAnimationFrame(animate);

    if(gun){
        gun.rotation.y += ((baseY + targetX) - gun.rotation.y) * 0.08;
        gun.rotation.x += ((baseX - targetY) - gun.rotation.x) * 0.08;
    }

    renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
