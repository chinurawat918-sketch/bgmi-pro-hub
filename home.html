<!DOCTYPE html>
<html>
<body style="margin:0; background:black;">

<div id="box" style="
position:absolute;
top:0;
left:0;
width:800px;
height:600px;
"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// Scene
let scene = new THREE.Scene();

// Camera
let camera = new THREE.PerspectiveCamera(75, 800/600, 0.1, 1000);
camera.position.z = 60;

// Renderer
let renderer = new THREE.WebGLRenderer();
renderer.setSize(800, 600);
document.getElementById("box").appendChild(renderer.domElement);

// Light
scene.add(new THREE.AmbientLight(0xffffff,1));

// ================= GUNS =================
let baseY1 = Math.PI/24, baseX1 = -Math.PI/2;
let baseY2 = Math.PI/2,  baseX2 = Math.PI/6;
let baseY3 = Math.PI/6,  baseX3 = Math.PI/6;

let gun1, gun2, gun3, gun3Group;

// 🔫 Gun 1
new THREE.GLTFLoader().load('pubg_mobile_m4_glacier.glb', (gltf)=>{
    gun1 = gltf.scene;
    gun1.scale.set(10,10,10);
    gun1.position.set(-15, 0, 0);
    gun1.rotation.set(baseX1, baseY1, 0);
    scene.add(gun1);
});

// 🔫 Gun 2
new THREE.GLTFLoader().load('ump-45__aggressor.glb', (gltf)=>{
    gun2 = gltf.scene;
    gun2.scale.set(.6,.6,.6);
    gun2.position.set(10, 0, 0);
    gun2.rotation.set(baseX2, baseY2, 0);
    scene.add(gun2);
});

// 🔫 Gun 3 (RIGHT + FRAME)
new THREE.GLTFLoader().load('awm_godzilla_animated_4k_textures.glb', (gltf)=>{
    gun3 = gltf.scene;

    gun3Group = new THREE.Group();
    scene.add(gun3Group);

    gun3.scale.set(10,10,10);
     gun3.rotation.set(baseX2, baseY2, 0);

    // FRAME
    let geometry = new THREE.BoxGeometry(30, 15, 10);
    let edges = new THREE.EdgesGeometry(geometry);

    let frame = new THREE.LineSegments(
        edges,
        new THREE.LineBasicMaterial({ color: 0x00ff00 })
    );

    frame.position.set(8, 0, 0); // adjust if needed

    gun3Group.add(gun3);
    gun3Group.add(frame);

    gun3Group.position.set(35, 0, 0);
});

// ================= CONTROLS =================
let activeGun = null;
let targetX = 0;
let targetY = 0;

// 🔥 movement offset
let offsetX = 0;
let offsetY = 0;

let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

function selectGun(clientX, clientY){
    let rect = renderer.domElement.getBoundingClientRect();

    mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    let intersects = raycaster.intersectObjects([gun1, gun2, gun3Group], true);

    if(intersects.length > 0){
        let obj = intersects[0].object;

        while (obj.parent && ![gun1, gun2, gun3Group].includes(obj)) {
            obj = obj.parent;
        }

        activeGun = obj;
    }
}

// Mouse
window.addEventListener("mousedown", (e)=>{
    selectGun(e.clientX, e.clientY);
});

window.addEventListener("mouseup", ()=>{
    activeGun = null;
});

window.addEventListener("mousemove", (e)=>{
    if(activeGun){
        targetX = (e.movementX) * 0.01;
        targetY = (e.movementY) * 0.01;
    }
});

// Arrow keys move gun3 group
window.addEventListener("keydown", (e)=>{
    if(e.key === "ArrowRight") offsetX += 0.5;
    if(e.key === "ArrowLeft") offsetX -= 0.5;
    if(e.key === "ArrowUp") offsetY += 0.5;
    if(e.key === "ArrowDown") offsetY -= 0.5;
});

// ================= ANIMATION =================
function animate(){
    requestAnimationFrame(animate);

    // move full group
    if(gun3Group){
        gun3Group.position.x = 35 + offsetX;
        gun3Group.position.y = 0 + offsetY;
    }

    [gun1, gun2, gun3Group].forEach((gun, i)=>{
        if(!gun) return;

        let baseY = [baseY1, baseY2, baseY3][i];
        let baseX = [baseX1, baseX2, baseX3][i];

        if(gun === activeGun){
            gun.rotation.y += targetX;
            gun.rotation.x += targetY;
        } else {
            gun.rotation.y += (baseY - gun.rotation.y) * 0.08;
            gun.rotation.x += (baseX - gun.rotation.x) * 0.08;
        }
    });

    renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
