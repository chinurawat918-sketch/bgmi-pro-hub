 <!DOCTYPE html>
<html>
<body style="margin:0; background:black;">

<div id="box" style="
position:absolute;
top:0;
left:0;
width:800px;
height:600px;
"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// Scene
let scene = new THREE.Scene();

// Camera
let camera = new THREE.PerspectiveCamera(75, 800/600, 0.1, 1000);
camera.position.z = 12;

// Renderer
let renderer = new THREE.WebGLRenderer();
renderer.setSize(800, 600);
document.getElementById("box").appendChild(renderer.domElement);

// Light
scene.add(new THREE.AmbientLight(0xffffff,1));

// ================= GUN 1 =================
let baseY1 = Math.PI/24;
let baseX1 = -Math.PI/2;

let gun1;
new THREE.GLTFLoader().load('pubg_mobile_m4_glacier.glb', (gltf)=>{
    gun1 = gltf.scene;

    gun1.scale.set(6,6,6);

    // 🔥 TOP
    gun1.position.set(0, 2.5, 0);

    gun1.rotation.y = baseY1;
    gun1.rotation.x = baseX1;

    scene.add(gun1);
});

// ================= UMP =================
let baseY2 = Math.PI/2;
let baseX2 = Math.PI/6;

let gun2;
new THREE.GLTFLoader().load('ump-45__aggressor.glb', (gltf)=>{
    gun2 = gltf.scene;

    gun2.scale.set(.2,.2,.2);

    // 🔥 CENTER
    gun2.position.set(0, 0, 0);

    gun2.rotation.y = baseY2;
    gun2.rotation.x = baseX2;

    scene.add(gun2);
});

// ================= AWM =================
let baseY3 = Math.PI/6;
let baseX3 = Math.PI/6;

let gun3;
new THREE.GLTFLoader().load('awm_godzilla_animated_4k_textures.glb', (gltf)=>{
    gun3 = gltf.scene;

    gun3.scale.set(10,10,10);

    // 🔥 BOTTOM
    gun3.position.set(0, -2.5, 0);

    gun3.rotation.y = baseY3;
    gun3.rotation.x = baseX3;

    scene.add(gun3);
});

// ================= CONTROLS =================
let activeGun = null;
let speed = 8;
let targetX = 0;
let targetY = 0;

let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

// 🔥 SELECT GUN (FIXED PROPERLY)
function selectGun(x, y){
    mouse.x = (x / 800) * 2 - 1;
    mouse.y = -(y / 600) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    let intersects = raycaster.intersectObjects([gun1, gun2, gun3], true);

    if(intersects.length > 0){
        let selected = intersects[0].object;

        while (selected.parent && ![gun1, gun2, gun3].includes(selected)) {
            selected = selected.parent;
        }

        activeGun = selected;
    }
}

// Mouse
window.addEventListener("mousedown", (e)=>{
    selectGun(e.clientX, e.clientY);
});

window.addEventListener("mouseup", ()=>{
    activeGun = null;
    targetX = 0;
    targetY = 0;
});

window.addEventListener("mousemove", (e)=>{
    if(activeGun){
        targetX = (e.clientX / window.innerWidth - 0.5) * speed;
        targetY = (e.clientY / window.innerHeight - 0.5) * speed;
    }
});

// Touch
window.addEventListener("touchstart", (e)=>{
    let t = e.touches[0];
    selectGun(t.clientX, t.clientY);
});

window.addEventListener("touchend", ()=>{
    activeGun = null;
    targetX = 0;
    targetY = 0;
});

window.addEventListener("touchmove", (e)=>{
    e.preventDefault();

    if(activeGun){
        let t = e.touches[0];

        targetX = (t.clientX / window.innerWidth - 0.5) * speed;
        targetY = (t.clientY / window.innerHeight - 0.5) * speed;
    }
});

// ================= ANIMATION =================
function animate(){
    requestAnimationFrame(animate);

    [gun1, gun2, gun3].forEach(gun=>{
        if(gun){
            if(gun === activeGun){
                gun.rotation.y += ((gun.rotation.y + targetX) - gun.rotation.y) * 0.2;
                gun.rotation.x += ((gun.rotation.x - targetY) - gun.rotation.x) * 0.2;
            } else {
                if(gun === gun1){
                    gun.rotation.y += (baseY1 - gun.rotation.y) * 0.05;
                    gun.rotation.x += (baseX1 - gun.rotation.x) * 0.05;
                }
                if(gun === gun2){
                    gun.rotation.y += (baseY2 - gun.rotation.y) * 0.05;
                    gun.rotation.x += (baseX2 - gun.rotation.x) * 0.05;
                }
                if(gun === gun3){
                    gun.rotation.y += (baseY3 - gun.rotation.y) * 0.05;
                    gun.rotation.x += (baseX3 - gun.rotation.x) * 0.05;
                }
            }
        }
    });

    renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
