 <!DOCTYPE html>
<html>
<body style="margin:0; background:black;">

<div id="box" style="
position:absolute;
top:0;
left:0;
width:800px;
height:600px;
"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// Scene
let scene = new THREE.Scene();

// Camera
let camera = new THREE.PerspectiveCamera(75, 800/600, 0.1, 1000);
camera.position.z = 10;

// Renderer
let renderer = new THREE.WebGLRenderer();
renderer.setSize(800, 600);
document.getElementById("box").appendChild(renderer.domElement);

// Light
scene.add(new THREE.AmbientLight(0xffffff,1));

// ================= GUN 1 =================
let baseY1 = Math.PI/24;
let baseX1 = -Math.PI/2;

let gun1;
new THREE.GLTFLoader().load('pubg_mobile_m4_glacier.glb', (gltf)=>{
    gun1 = gltf.scene;

    gun1.scale.set(6,6,6);

    // 🔥 LEFT
    gun1.position.set(-3, 1.5, 0);

    gun1.rotation.y = baseY1;
    gun1.rotation.x = baseX1;

    scene.add(gun1);
});

// ================= UMP =================
let baseY2 = Math.PI/2;
let baseX2 = Math.PI/6;

let gun2;
new THREE.GLTFLoader().load('ump-45__aggressor.glb', (gltf)=>{
    gun2 = gltf.scene;

    gun2.scale.set(.2,.2,.2);

    // 🔥 CENTER
    gun2.position.set(0, 1.5, 0);

    gun2.rotation.y = baseY2;
    gun2.rotation.x = baseX2;

    scene.add(gun2);
});

// ================= AWM =================
let baseY3 = Math.PI/6;
let baseX3 = Math.PI/6;

let gun3;
new THREE.GLTFLoader().load('awm_godzilla_animated_4k_textures.glb', (gltf)=>{
    gun3 = gltf.scene;

    gun3.scale.set(10,10,10);

    // 🔥 RIGHT
    gun3.position.set(3, 1.5, 0);

    gun3.rotation.y = baseY3;
    gun3.rotation.x = baseX3;

    scene.add(gun3);
});

// ================= CONTROLS =================
let rightClick = false;
let isTouch = false;

let speed = 8;
let targetX = 0;
let targetY = 0;

window.addEventListener("mousedown", (e)=>{
    if(e.button === 2) rightClick = true;
});

window.addEventListener("mouseup", ()=>{
    rightClick = false;
    targetX = 0;
    targetY = 0;
});

window.addEventListener("contextmenu", e=>e.preventDefault());

window.addEventListener("mousemove", (e)=>{
    if(rightClick){
        targetX = (e.clientX / window.innerWidth - 0.5) * speed;
        targetY = (e.clientY / window.innerHeight - 0.5) * speed;
    }
});

// Touch
window.addEventListener("touchstart", ()=>{ isTouch = true; });
window.addEventListener("touchend", ()=>{
    isTouch = false;
    targetX = 0;
    targetY = 0;
});

window.addEventListener("touchmove", (e)=>{
    e.preventDefault();

    let t = e.touches[0];
    targetX = (t.clientX / window.innerWidth - 0.5) * speed;
    targetY = (t.clientY / window.innerHeight - 0.5) * speed;
});

// ================= ANIMATION =================
function animate(){
    requestAnimationFrame(animate);

    [gun1, gun2, gun3].forEach(gun=>{
        if(gun){
            if(rightClick || isTouch){
                gun.rotation.y += ((gun.rotation.y + targetX) - gun.rotation.y) * 0.2;
                gun.rotation.x += ((gun.rotation.x - targetY) - gun.rotation.x) * 0.2;
            } else {
                // return to base (each uses its own base)
                if(gun === gun1){
                    gun.rotation.y += (baseY1 - gun.rotation.y) * 0.05;
                    gun.rotation.x += (baseX1 - gun.rotation.x) * 0.05;
                }
                if(gun === gun2){
                    gun.rotation.y += (baseY2 - gun.rotation.y) * 0.05;
                    gun.rotation.x += (baseX2 - gun.rotation.x) * 0.05;
                }
                if(gun === gun3){
                    gun.rotation.y += (baseY3 - gun.rotation.y) * 0.05;
                    gun.rotation.x += (baseX3 - gun.rotation.x) * 0.05;
                }
            }
        }
    });

    renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
