<!DOCTYPE html>
<html>
<body style="margin:0; background:black;">

<!-- 🔲 4:3 BOX (TOP LEFT) -->
<div id="box" style="
position:absolute;
top:0;
left:0;
width:800px;
height:600px;
"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// Scene
let scene = new THREE.Scene();

// Camera
let camera = new THREE.PerspectiveCamera(75, 800/600, 0.1, 1000);
camera.position.z = 10;

// Renderer
let renderer = new THREE.WebGLRenderer();
renderer.setSize(800, 600);
document.getElementById("box").appendChild(renderer.domElement);

// Light
scene.add(new THREE.AmbientLight(0xffffff,1));

// Base rotation
let baseY = Math.PI/24;
let baseX = -Math.PI/2;

// 🔫 Gun 1 (Top Left)
new THREE.GLTFLoader().load('pubg_mobile_m4_glacier.glb', (gltf)=>{
    let gun1 = gltf.scene;
    gun1.scale.set(4,4,4);
    gun1.position.set(-2.5, 1.5, 0);
    gun1.rotation.y = baseY;
    gun1.rotation.x = baseX;
    scene.add(gun1);
});

// 🔫 Gun 2 (Top Right)
new THREE.GLTFLoader().load('awm_godzilla_animated_4k_textures.glb', (gltf)=>{
    let gun2 = gltf.scene;
    gun2.scale.set(4,4,4);
    gun2.position.set(2.5, 1.5, 0);
    gun2.rotation.y = baseY;
    gun2.rotation.x = baseX;
    scene.add(gun2);
});

// 🔫 Gun 3 (Bottom Left)
new THREE.GLTFLoader().load('ump-45__aggressor.glb', (gltf)=>{
    let gun3 = gltf.scene;
    gun3.scale.set(4,4,4);
    gun3.position.set(-2.5, -1.5, 0);
    gun3.rotation.y = baseY;
    gun3.rotation.x = baseX;
    scene.add(gun3);
});

// 🔫 Gun 4 (Bottom Right)
new THREE.GLTFLoader().load('ak47.glb', (gltf)=>{
    let gun4 = gltf.scene;
    gun4.scale.set(4,4,4);
    gun4.position.set(2.5, -1.5, 0);
    gun4.rotation.y = baseY;
    gun4.rotation.x = baseX;
    scene.add(gun4);
});

// Animation
function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
