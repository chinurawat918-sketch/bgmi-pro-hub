<html>
<head>
<style>
body {
    text-align: center;
    background: black;
    color: white;
}
</style>
</head>

<body>

<h1>My Website 🔥</h1>

<!-- Button -->
<button onclick="show()">Click</button>

<!-- Input -->
<br><br>
<input type="text" id="name">
<button onclick="greet()">Submit</button>
<h2 id="output"></h2>

<script>
function show() {
    alert("Working 🔥");
}

function greet() {
    let n = document.getElementById("name").value;
    output.innerHTML = "Hello " + n;
}
</script>

</body>
</html>
