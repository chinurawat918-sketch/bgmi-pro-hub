 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BGMI Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            overflow: hidden;
        }

        /* VIDEO BACKGROUND */
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* DARK OVERLAY + BLUR */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            z-index: -1;
        }

        /* LOGIN BOX */
        .login-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            padding: 40px;
            border-radius: 12px;
            color: white;
            text-align: center;
            width: 320px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        /* 🔘 SOCIAL BUTTONS */
        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-weight: bold;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
        }

        .guest {
            background: #dcdcdc;
            color: black;
        }

        .facebook {
            background: #1877f2;
            color: white;
        }

        .google {
            background: #ffffff;
            color: black;
        }

        .twitter {
            background: #1da1f2;
            color: white;
        }

        .btn:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

    </style>
</head>

<body>

    <!-- VIDEO -->
    <video autoplay muted loop playsinline>
        <source src="bgmi.mp4" type="video/mp4">
    </video>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- LOGIN BOX -->
    <div class="login-box">
        <h2>Select Account</h2>

        <div class="btn guest">👤 SIGN IN AS GUEST</div>
        <div class="btn facebook">🔵 SIGN IN WITH FACEBOOK</div>
        <div class="btn google">🟢 SIGN IN WITH GOOGLE</div>
        <div class="btn twitter">🐦 SIGN IN WITH TWITTER</div>
    </div>

</body>
</html>
