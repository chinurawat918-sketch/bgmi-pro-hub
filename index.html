<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logic Page</title>

  <style>
    /* ===== PAGE ===== */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    /* ===== BACKGROUND VIDEO ===== */
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover; /* VERY IMPORTANT */
      z-index: -1;
    }

    /* ===== CONTENT ===== */
    .content {
      position: relative;
      z-index: 1;
      color: white;
      text-align: center;
      top: 40%;
    }

    h1 {
      font-size: 40px;
      text-shadow: 0 0 20px #00ffcc;
    }

    p {
      font-size: 18px;
    }
  </style>
</head>

<body>

  <!-- 🔥 BACKGROUND VIDEO -->
  <video autoplay muted loop playsinline>
    <source src="bgmi.mp4" type="video/mp4">
  </video>

  <!-- 🔥 CONTENT -->
  <div class="content">
    <h1>BGMI Logic Page</h1>
    <p>Welcome to my gaming website</p>
  </div>

</body>
</html>
