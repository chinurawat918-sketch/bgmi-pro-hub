<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logic Page</title>

  <style>
    /* ================= PAGE ================= */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    /* ================= VIDEO BACKGROUND ================= */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    .video-bg iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 56.25vw;
      min-height: 100vh;
      min-width: 177.77vh;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* ================= CONTENT ================= */
    .content {
      position: relative;
      z-index: 1;
      color: white;
      text-align: center;
      top: 40%;
    }

    h1 {
      font-size: 40px;
      text-shadow: 0 0 20px #00ffcc;
    }

    p {
      font-size: 18px;
    }

    /* ================= INPUT ================= */
    .form-container .form-row input {
      width: 100%;
      height: 30px;
      padding: 5px;
      border: 2px solid #ddd;
      outline: none;
    }

    /* ================= IMAGE ================= */
    .form-container img {
      margin-bottom: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- ================= BACKGROUND VIDEO ================= -->
  <div class="video-bg">
    <iframe 
      src="https://www.youtube.com/embed/KcFwQdezw4o?autoplay=1&mute=1&controls=0&loop=1&playlist=KcFwQdezw4o&playsinline=1"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <!-- ================= MAIN CONTENT ================= -->
  <div class="content">

    <h1>BGMI Logic Page</h1>
    <p>Welcome to my gaming website</p>

    <div class="form-container">

      <!-- IMAGE -->
      <div class="form-row">
        <img src="https://via.placeholder.com/150" width="150">
      </div>

      <!-- INPUT -->
      <div class="form-row">
        <input type="text" placeholder="Enter something...">
      </div>

    </div>

  </div>

</body>
</html>
