<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logic Page</title>

  <style>
    /* ================= PAGE ================= */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    /* ================= BACKGROUND VIDEO ================= */
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
    }

    /* ================= CONTENT ================= */
    .content {
      position: relative;
      z-index: 1;
      color: white;
      text-align: center;
      top: 40%;
    }

    h1 {
      font-size: 40px;
      text-shadow: 0 0 20px #00ffcc;
    }

    p {
      font-size: 18px;
    }

    /* ================= INPUT ================= */
    .form-container .form-row input {
      width: 100%;
      height: 30px;
      padding: 5px;
      border: 2px solid #ddd;
      outline: none;
    }

    /* ================= IMAGE ================= */
    .form-container img {
      margin-bottom: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- 🔥 BACKGROUND VIDEO -->
  <video autoplay muted loop playsinline>
    <source src="bgmi.mp4" type="video/mp4">
  </video>

  <!-- 🔥 MAIN CONTENT -->
  <div class="content">

    <h1>BGMI Logic Page</h1>
    <p>Welcome to my gaming website</p>

    <div class="form-container">

      <!-- IMAGE -->
      <div class="form-row">
        <img src="https://via.placeholder.com/150" width="150">
      </div>

      <!-- INPUT -->
      <div class="form-row">
        <input type="text" placeholder="Enter something...">
      </div>

    </div>

  </div>

</body>
</html>
