<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BGMI Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            overflow: hidden;
        }

        /* 🎥 VIDEO BACKGROUND */
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* 🌫 OVERLAY */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            z-index: -1;
        }

        /* 📦 LOGIN BOX */
        .login-box {
            position: fixed;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.75);
            padding: 40px;
            border-radius: 12px;
            color: white;
            width: 320px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .logo-text {
            text-align: right;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .login-box h2 {
            text-align: right;
            margin-bottom: 20px;
        }

        /* INPUT */
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 10px;
            background: orange;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: darkorange;
            transform: scale(1.05);
        }

        /* SOCIAL BUTTONS */
        .btn {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border-radius: 8px;
            font-weight: bold;
            text-align: left;
            cursor: pointer;
        }

        .guest { background: #dcdcdc; color: black; }
        .facebook { background: #1877f2; color: white; }
        .google { background: #ffffff; color: black; }
        .twitter { background: #1da1f2; color: white; }

    </style>
</head>

<body>

    <!-- 🎥 VIDEO -->
    <video autoplay muted loop playsinline>
        <source src="bgmi.mp4" type="video/mp4">
    </video>

    <!-- 🌫 OVERLAY -->
    <div class="overlay"></div>

    <!-- 📦 LOGIN BOX -->
    <div class="login-box">

        <div class="logo-text">BGMI</div>

        <h2>Login</h2>

        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">

        <!-- 🔥 WORKING LOGIN BUTTON -->
        <button onclick="login()">Login</button>

        <hr style="margin:15px 0; border:1px solid #555;">

        <div class="btn guest">👤 SIGN IN AS GUEST</div>
        <div class="btn facebook">🔵 SIGN IN WITH FACEBOOK</div>
        <div class="btn google">🟢 SIGN IN WITH GOOGLE</div>
        <div class="btn twitter">🐦 SIGN IN WITH TWITTER</div>

    </div>

    <!-- 🔧 SCRIPT -->
    <script>
        function login() {
            window.location.href = "home.html";
        }
    </script>

</body>
</html>
