<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logic Page</title>

  <style>

    /* ================= BACKGROUND + PAGE STYLE ================= */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    /* ================= MAIN CONTENT ================= */
    .content {
      position: relative;
      z-index: 1;
      color: white;
      text-align: center;
      top: 40%;
    }

    /* ================= HEADING STYLE ================= */
    h1 {
      font-size: 40px;
      text-shadow: 0 0 20px #00ffcc;
    }

    /* ================= PARAGRAPH ================= */
    p {
      font-size: 18px;
    }

    /* ================= INPUT STYLE ================= */
    .form-container .form-row input {
      width: 100%;
      height: 30px;
      margin: 0;
      padding: 5px;
      outline: none;
      border: 2px solid #dddddd;
    }

    /* ================= IMAGE STYLE ================= */
    .form-container img {
      margin-bottom: 15px;
      border-radius: 10px;
    }

  </style>
</head>

<body>

  <!-- ================= FULLSCREEN BACKGROUND VIDEO ================= -->
  <iframe 
    src="https://www.youtube.com/embed/w2Ths5GJimc?autoplay=1&mute=1&controls=0&loop=1&playlist=w2Ths5GJimc&playsinline=1"
    frameborder="0"
    allow="autoplay; encrypted-media"
    allowfullscreen
    style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;">
  </iframe>

  <!-- ================= MAIN CONTENT ================= -->
  <div class="content">

    <h1>BGMI Logic Page</h1>
    <p>Welcome to my gaming website</p>

    <!-- ================= LOGIC SECTION ================= -->
    <div class="form-container">

      <!-- IMAGE -->
      <div class="form-row">
        <img src="https://via.placeholder.com/150" alt="image" width="150">
      </div>

      <!-- INPUT -->
      <div class="form-row">
        <input type="text" placeholder="Enter something...">
      </div>

    </div>

  </div>

</body>
</html>
